<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Callback</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .status {
      font-size: 14px;
      color: #888;
    }
    .success {
      color: #10b981;
    }
    .error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="message">Processando autenticação...</div>
    <div class="status" id="status"></div>
  </div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      
      try {
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        if (error) {
          throw new Error(errorDescription || error);
        }

        if (!code) {
          throw new Error('Código de autorização não encontrado');
        }

        // Verify state
        const savedState = window.opener?.sessionStorage.getItem('oauth_state');
        if (state !== savedState) {
          throw new Error('Estado inválido - possível ataque CSRF');
        }

        // Get provider and service
        const provider = window.opener?.sessionStorage.getItem('oauth_provider');
        const service = window.opener?.sessionStorage.getItem('oauth_service');

        statusEl.textContent = 'Salvando credenciais...';

        // Store the authorization code temporarily
        if (window.opener) {
          window.opener.sessionStorage.setItem('oauth_code', code);
          window.opener.sessionStorage.setItem('oauth_token_temp', JSON.stringify({
            code,
            provider,
            service,
            timestamp: Date.now()
          }));

          // Dispatch event to parent window
          window.opener.dispatchEvent(new CustomEvent('oauth:success', {
            detail: { code, provider, service }
          }));
        }

        // Success
        document.querySelector('.message').textContent = 'Autenticação concluída!';
        document.querySelector('.message').classList.add('success');
        statusEl.textContent = 'Você pode fechar esta janela';
        statusEl.classList.add('success');
        document.querySelector('.spinner').style.display = 'none';

        // Close window after 2 seconds
        setTimeout(() => {
          window.close();
        }, 2000);

      } catch (error) {
        console.error('OAuth callback error:', error);
        document.querySelector('.message').textContent = 'Erro na autenticação';
        document.querySelector('.message').classList.add('error');
        statusEl.textContent = error.message;
        statusEl.classList.add('error');
        document.querySelector('.spinner').style.display = 'none';

        // Close window after 3 seconds
        setTimeout(() => {
          window.close();
        }, 3000);
      }
    })();
  </script>
</body>
</html>
