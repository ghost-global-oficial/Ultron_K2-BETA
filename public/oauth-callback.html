<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Callback</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .status {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }
    .success {
      color: #10b981;
    }
    .error {
      color: #ef4444;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <div class="icon" id="icon" style="display: none;"></div>
    <div class="message" id="message">Processando autenticação...</div>
    <div class="status" id="status">Aguarde enquanto validamos suas credenciais</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://iskzruvdeqegerhphyec.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlza3pydXZkZXFlZ2VyaHBoeWVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTAxMjUsImV4cCI6MjA5MDIyNjEyNX0.K2qNsZAV97qwYDq9HfufTrFZDcX-fSnPGjIf4oCkqw8';

    (async function() {
      const messageEl = document.getElementById('message');
      const statusEl = document.getElementById('status');
      const spinnerEl = document.getElementById('spinner');
      const iconEl = document.getElementById('icon');

      try {
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        console.log('[OAuth Callback] Received:', { code: !!code, state, error });

        if (error) {
          throw new Error(errorDescription || error);
        }

        if (!code) {
          throw new Error('Código de autorização não encontrado');
        }

        // Verify state
        const savedState = window.opener?.sessionStorage.getItem('oauth_state');
        if (state !== savedState) {
          console.error('[OAuth Callback] State mismatch:', { received: state, expected: savedState });
          throw new Error('Estado inválido - possível ataque CSRF');
        }

        // Get provider and service
        const provider = window.opener?.sessionStorage.getItem('oauth_provider');
        const service = window.opener?.sessionStorage.getItem('oauth_service');
        const codeVerifier = window.opener?.sessionStorage.getItem('oauth_code_verifier');

        console.log('[OAuth Callback] Provider:', provider, 'Service:', service);

        statusEl.textContent = 'Trocando código por token de acesso...';

        // Exchange code for token using Edge Function
        const response = await fetch(`${SUPABASE_URL}/functions/v1/oauth-callback`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'apikey': SUPABASE_ANON_KEY
          },
          body: JSON.stringify({
            code,
            state,
            provider,
            redirect_uri: window.location.origin + window.location.pathname,
            code_verifier: codeVerifier
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          console.error('[OAuth Callback] Token exchange failed:', errorText);
          throw new Error(`Falha ao trocar código: ${response.status}`);
        }

        const tokenData = await response.json();
        console.log('[OAuth Callback] Token received');

        statusEl.textContent = 'Salvando credenciais...';

        // Store token data
        if (window.opener) {
          const tokenInfo = {
            ...tokenData,
            provider,
            service,
            timestamp: Date.now()
          };

          // Store in localStorage for persistence
          window.opener.localStorage.setItem('oauth_token', JSON.stringify(tokenInfo));
          
          // Store temporarily for immediate use
          window.opener.sessionStorage.setItem('oauth_token_temp', JSON.stringify(tokenInfo));

          // Send message to parent window (works with COOP)
          window.opener.postMessage({
            type: 'oauth:success',
            data: tokenInfo
          }, window.location.origin);

          // Dispatch event to parent window (fallback)
          window.opener.dispatchEvent(new CustomEvent('oauth:success', {
            detail: tokenInfo
          }));

          console.log('[OAuth Callback] Token stored and messages sent');
        }

        // Success
        spinnerEl.style.display = 'none';
        iconEl.style.display = 'block';
        iconEl.textContent = '✓';
        iconEl.classList.add('success');
        messageEl.textContent = 'Autenticação concluída!';
        messageEl.classList.add('success');
        statusEl.textContent = 'Você pode fechar esta janela';
        statusEl.classList.add('success');

        // Close window after 2 seconds
        setTimeout(() => {
          window.close();
        }, 2000);

      } catch (error) {
        console.error('[OAuth Callback] Error:', error);
        
        spinnerEl.style.display = 'none';
        iconEl.style.display = 'block';
        iconEl.textContent = '✗';
        iconEl.classList.add('error');
        messageEl.textContent = 'Erro na autenticação';
        messageEl.classList.add('error');
        statusEl.textContent = error.message;
        statusEl.classList.add('error');

        // Close window after 3 seconds
        setTimeout(() => {
          window.close();
        }, 3000);
      }
    })();
  </script>
</body>
</html>
